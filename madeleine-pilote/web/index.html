<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Madeleine — votre visite du matin</title>
<style>
  :root { --bg:#fbf7ef; --ink:#1f2733; --accent:#60a5fa; --accent2:#3ddc97; --warn:#f5b14c; --danger:#ef5a5a; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; }
  body {
    background: radial-gradient(120% 90% at 50% 0%, #ffffff 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    display:flex; flex-direction:column; min-height:100%;
    -webkit-font-smoothing:antialiased;
  }
  header { padding: 28px 24px 8px; text-align:center; }
  header h1 { margin:0; font-size: 30px; font-weight:700; letter-spacing:-.01em; }
  header p { margin:6px 0 0; font-size:18px; color:#5a6472; }
  main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; padding:16px 24px 24px; }
  /* Madeleine speech bubble — very large text, high contrast (founding constraint) */
  #say {
    max-width: 760px; width:100%; font-size: 30px; line-height:1.5; text-align:center;
    background:#fff; border:2px solid #e7dfd1; border-radius:24px; padding:28px 30px;
    box-shadow: 0 18px 50px rgba(31,39,51,.08); min-height: 120px;
    display:flex; align-items:center; justify-content:center;
  }
  /* The single big button — the ONLY control */
  #talk {
    appearance:none; border:none; cursor:pointer; color:#fff;
    width: 240px; height:240px; border-radius:50%;
    font-size: 30px; font-weight:700; letter-spacing:.01em;
    background: radial-gradient(120% 120% at 30% 25%, #8fc2ff 0%, var(--accent) 55%, #3f7fd6 100%);
    box-shadow: 0 18px 60px rgba(96,165,250,.45), inset 0 2px 8px rgba(255,255,255,.5);
    transition: transform .12s ease, box-shadow .2s ease, background .3s ease;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;
  }
  #talk:active { transform: scale(.97); }
  #talk.listening { background: radial-gradient(120% 120% at 30% 25%, #8af0cf 0%, var(--accent2) 55%, #1fae86 100%); animation: pulse 1.6s ease-in-out infinite; }
  #talk.speaking { background: radial-gradient(120% 120% at 30% 25%, #cdbcff 0%, #a78bfa 55%, #7c5cff 100%); }
  @keyframes pulse { 0%,100%{ box-shadow:0 18px 60px rgba(61,220,151,.40), inset 0 2px 8px rgba(255,255,255,.5);} 50%{ box-shadow:0 18px 90px rgba(61,220,151,.75), inset 0 2px 8px rgba(255,255,255,.5);} }
  #hint { font-size:18px; color:#7a8493; min-height:24px; text-align:center; }
  #youSaid { font-size:18px; color:#9aa3b1; max-width:760px; text-align:center; min-height:22px; font-style:italic; }
  .banner { font-size:14px; color:#7a8493; text-align:center; padding:10px; border-top:1px solid #ece5d8; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f141b; --ink:#eef2f7; }
    body{ background: radial-gradient(120% 90% at 50% 0%, #16202b 0%, var(--bg) 60%); }
    header p{ color:#9aa6b6; } #say{ background:#161e27; border-color:#283442; }
    #youSaid{ color:#6b7686; } .banner{ border-top-color:#222c38; color:#7e8a99; }
  }
</style>
</head>
<body>
  <header>
    <h1>Bonjour 🌼</h1>
    <p>Appuyez sur le grand bouton et parlez à Madeleine</p>
  </header>

  <main>
    <div id="say">Bonjour ! Je suis Madeleine. Quand vous voulez, appuyez sur le bouton bleu et dites-moi bonjour.</div>
    <button id="talk" aria-label="Parler à Madeleine">Parler</button>
    <div id="hint"></div>
    <div id="youSaid"></div>
  </main>

  <div class="banner">
    Séance enregistrée et revisible (consentement) · proto local · aucun diagnostic médical
  </div>

<script>
/* ───────────────────────────────────────────────────────────────────────────
   Madeleine — page vocale du pilote (Web Speech API).
   - STT : SpeechRecognition (fr-FR)  ·  TTS : speechSynthesis (fr-FR)
   - Endpointing ALLONGÉ : on respecte l'anomie (invariant n°3 + doc « Orthophonie
     et Démence » : tolérer 8–10 s de silence). On ne clôt le tour qu'après ~8 s ;
     on ne coupe jamais sur un souffle ni sur une recherche de mot.
   - Le cerveau est Hermes : POST {text} → HERMES_ENDPOINT, qui renvoie {reply}.
     À défaut d'endpoint, un mode démo local fait avancer une séance scriptée
     pour montrer la boucle (les 4 phases) sans dépendance réseau.
   ─────────────────────────────────────────────────────────────────────────── */

const SILENCE_MS = 8000;          // anomie : fin de tour après ~8 s (doc : tolérer 8–10 s)
const HERMES_ENDPOINT = "/__hermes_chat";  // réutilise le middleware claude-os (Hermes = cerveau)
const PATIENT = "mme-durand";

const sayEl = document.getElementById("say");
const youEl = document.getElementById("youSaid");
const hintEl = document.getElementById("hint");
const btn = document.getElementById("talk");

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false, silenceTimer = null, finalText = "";
let hermesSession = null;         // capture la continuité native de session Hermes

const TTS_ENDPOINT = "http://127.0.0.1:8055/tts";   // serveur TTS LOCAL (voix macOS naturelle)
async function speak(text){
  sayEl.textContent = text;
  btn.classList.add("speaking"); hintEl.textContent = "Madeleine parle…";
  try {
    const r = await fetch(TTS_ENDPOINT, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ text }) });
    if (!r.ok) throw new Error("tts "+r.status);
    const url = URL.createObjectURL(await r.blob());
    const a = new Audio(url);
    await new Promise((res)=>{ a.onended=res; a.onerror=res; a.play().catch(()=>res()); });
    URL.revokeObjectURL(url);
  } catch(e){
    // repli : voix navigateur si le serveur TTS local est arrêté
    try { window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang="fr-FR"; u.rate=0.9; window.speechSynthesis.speak(u); await new Promise(res=>{u.onend=res;u.onerror=res;}); } catch(_){}
  }
  btn.classList.remove("speaking"); hintEl.textContent="";
}

let osToken = "";
async function getToken(){
  if (osToken) return osToken;
  try { const t = await fetch("/__token"); if (t.ok) osToken = (await t.json()).token || ""; } catch(e){}
  return osToken;
}
async function askHermes(text){
  // Relaie le tour au cerveau Hermes via /__hermes_chat (charge le skill madeleine-session).
  // /__hermes_chat est token-gated et renvoie un flux SSE (event-stream) ; on lit tout le flux,
  // on assemble les 'data:' en réponse, et on capte le session_id pour la continuité.
  try{
    const token = await getToken();
    const r = await fetch(HERMES_ENDPOINT, {
      method:"POST",
      headers:{ "Content-Type":"application/json", ...(token ? {"X-Claude-OS-Token": token} : {}) },
      body: JSON.stringify({ prompt: text, skill:"madeleine-session", yolo:true, ...(hermesSession ? {sessionId: hermesSession} : {}) })
    });
    if(!r.ok) throw new Error("hermes http "+r.status);
    const raw = await r.text();                       // le SSE se termine quand Hermes a fini
    let buf = "";
    for (const line of raw.split(/\r?\n/)) if (line.startsWith("data:")) buf += line.slice(5).replace(/^ /,"");
    buf = buf.replace(/\x1b\[[0-9;]*m/g, "");          // strip ANSI
    const sm = buf.match(/session_id:\s*([A-Za-z0-9_-]+)/);
    if (sm) hermesSession = sm[1];
    const reply = buf.replace(/session_id:\s*[A-Za-z0-9_-]+/, "").replace(/\s*\bok\s*$/i,"").trim();
    return reply || "…";
  }catch(e){
    return demoReply(text);   // repli hors-ligne : séance scriptée (si Hermes injoignable)
  }
}

/* Repli démo local — fait visiblement avancer les 4 phases sans réseau,
   pour pouvoir montrer la boucle même sans Hermes branché. */
const demoScript = [
  "Bonjour {p} ! Quel plaisir de vous retrouver ce matin. Dehors, l'été est bien là, les roses sont en fleur. Comment vous sentez-vous aujourd'hui ?",
  "Hier, vous m'aviez parlé de votre jardin et de vos belles roses. Ça vous dirait qu'on en reparle un instant ?",
  "J'aimerais qu'on pense ensemble à votre petite-fille. Son prénom commence par un C… prenez tout votre temps, il n'y a rien à réussir.",
  "C'est joliment dit. On s'arrête là pour aujourd'hui, vous m'avez fait plaisir. Vous me raconterez la suite demain — passez une douce journée 🌼"
];
let demoStep = 0;
function demoReply(){
  const t = demoScript[Math.min(demoStep, demoScript.length-1)].replace("{p}","Geneviève");
  demoStep++;
  return t;
}

function startListening(){
  if (!SR){ speak("Ce navigateur ne permet pas encore la voix. Essayez Chrome."); return; }
  if (listening) return;
  rec = new SR();
  rec.lang = "fr-FR"; rec.continuous = true; rec.interimResults = true;
  finalText = "";
  rec.onstart = ()=>{ listening=true; btn.classList.add("listening"); btn.textContent="J'écoute…"; hintEl.textContent="Parlez tranquillement, prenez votre temps."; };
  rec.onresult = (e)=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const tr = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += tr + " "; else interim += tr;
    }
    youEl.textContent = (finalText + interim).trim();
    // anomie : on RÉARME le minuteur à chaque salve → une pause longue ne coupe pas
    if (silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(endTurn, SILENCE_MS);
  };
  rec.onerror = (e)=>{ hintEl.textContent = "Petit souci de micro… réappuyez quand vous voulez."; };
  rec.onend = ()=>{ listening=false; btn.classList.remove("listening"); btn.textContent="Parler"; };
  try { rec.start(); } catch(e){}
}

async function endTurn(){
  if (silenceTimer){ clearTimeout(silenceTimer); silenceTimer=null; }
  const text = finalText.trim();
  if (listening && rec){ try{ rec.stop(); }catch(e){} }
  if (!text){ hintEl.textContent="Je vous écoute quand vous voulez."; return; }
  hintEl.textContent = "Madeleine réfléchit…";
  const reply = await askHermes(text);
  await speak(reply);
}

btn.addEventListener("click", ()=>{
  // Premier appui : on déverrouille la voix (politique navigateur) + on accueille.
  if (window.speechSynthesis && window.speechSynthesis.getVoices().length===0){
    window.speechSynthesis.onvoiceschanged = ()=>{};
  }
  if (!listening){
    // Réactif : Geneviève parle d'abord ; sa parole déclenche Madeleine (skill).
    startListening();
  } else {
    endTurn();
  }
});
</script>
</body>
</html>
